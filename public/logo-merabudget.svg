<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-purple-blue" x1="0" y1="0" x2="240" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Graphical Element: Stylized 'M' / Growth Arrow -->
  <g filter="url(#glow)">
    <path d="M12 48V24L24 36L36 12L52 40V48H12Z" fill="url(#gradient-purple-blue)" fill-opacity="0.2" />
    <path d="M12 48L24 32L36 44L52 16" stroke="url(#gradient-purple-blue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="52" cy="16" r="4" fill="#4ADE80" /> <!-- Mint Green Accent -->
  </g>

  <!-- Typography -->
  <text x="68" y="44" fill="white" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.02em">
    Mera<tspan fill="url(#gradient-purple-blue)">Budget</tspan>
  </text>
  
  <!-- Subtle Tagline or Underline -->
  <rect x="68" y="52" width="120" height="2" rx="1" fill="url(#gradient-purple-blue)" fill-opacity="0.3" />
</svg>
